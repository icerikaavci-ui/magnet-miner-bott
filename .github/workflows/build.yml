name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip project
        run: unzip MagnetMinerBot.zip
      - name: Build APK
        run: |
          cd MagnetMinerBot
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: MagnetMinerBot-APK
          path: MagnetMinerBot/app/build/outputs/apk/debug/*.apk
